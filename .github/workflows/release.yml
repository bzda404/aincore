name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  # Pin a specific llama.cpp release tag for reproducible builds.
  # Set to 'latest' to auto-detect from GitHub's redirect, or pin e.g. 'b9611'.
  LLAMA_CPP_RELEASE: 'latest'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            arch: x64
            bin_dir: linux
            asset_name: bin-ubuntu-x64.tar.gz
          - platform: macos
            os: macos-latest
            arch: arm64
            bin_dir: mac
            asset_name: bin-macos-arm64.tar.gz
          - platform: macos
            os: macos-latest
            arch: x64
            bin_dir: mac
            asset_name: bin-macos-x64.tar.gz
          - platform: windows
            os: windows-latest
            arch: x64
            bin_dir: win
            asset_name: bin-win-cpu-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Download llama.cpp binaries (not stored in git due to size).
      # Uses GitHub's /releases/latest redirect to resolve the tag, then downloads
      # the platform-specific archive. Falls back to pinned LLAMA_CPP_RELEASE.
      - name: Download llama.cpp binaries
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${LLAMA_CPP_RELEASE}" = "latest" ]; then
            # Resolve latest tag via GitHub's redirect (no API rate limit)
            RELEASE_TAG=$(curl -fsSL -o /dev/null -w '%{url_effective}' \
              "https://github.com/ggerganov/llama.cpp/releases/latest" \
              | sed 's|.*/tag/||')
          else
            RELEASE_TAG="${LLAMA_CPP_RELEASE}"
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            echo "::error::Failed to resolve llama.cpp release tag"
            exit 1
          fi

          echo "Resolved llama.cpp release: ${RELEASE_TAG}"
          ASSET="llama-${RELEASE_TAG}-${{ matrix.asset_name }}"
          ASSET_URL="https://github.com/ggerganov/llama.cpp/releases/download/${RELEASE_TAG}/${ASSET}"
          echo "Downloading: ${ASSET_URL}"

          ARCHIVE_PATH="${RUNNER_TEMP}/llama-bin"
          mkdir -p "resources/binaries/${{ matrix.bin_dir }}"

          HTTP_CODE=$(curl -fSL -o "${ARCHIVE_PATH}" -w '%{http_code}' "${ASSET_URL}")
          echo "Download HTTP status: ${HTTP_CODE}"

          FILE_SIZE=$(wc -c < "${ARCHIVE_PATH}")
          echo "Downloaded file size: ${FILE_SIZE} bytes"
          if [ "${FILE_SIZE}" -lt 1000 ]; then
            echo "::error::Downloaded file too small, likely a failed download"
            exit 1
          fi

          if [[ "${{ matrix.asset_name }}" == *.tar.gz ]]; then
            tar xzf "${ARCHIVE_PATH}" -C "resources/binaries/${{ matrix.bin_dir }}"
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            WIN_ARCHIVE=$(cygpath -w "${ARCHIVE_PATH}")
            WIN_DEST=$(cygpath -w "resources/binaries/${{ matrix.bin_dir }}")
            pwsh -Command "Expand-Archive -Path '${WIN_ARCHIVE}' -DestinationPath '${WIN_DEST}' -Force"
          else
            unzip -o "${ARCHIVE_PATH}" -d "resources/binaries/${{ matrix.bin_dir }}"
          fi

          # Ensure llama-server is executable on Unix
          if [ "${{ matrix.platform }}" != "windows" ]; then
            chmod +x "resources/binaries/${{ matrix.bin_dir }}/llama-server" 2>/dev/null || true
          fi

          echo "Binaries downloaded:"
          ls -la "resources/binaries/${{ matrix.bin_dir }}/"

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: pnpm run build:linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build macOS
        if: matrix.platform == 'macos'
        run: pnpm run build:mac:${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Windows
        if: matrix.platform == 'windows'
        run: pnpm run build:win:${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'
      - uses: actions/upload-artifact@v4
        with:
          name: aincore-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.nupkg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.snap
            dist/*.yml
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
