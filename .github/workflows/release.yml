name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  # Pin a specific llama.cpp release for reproducible builds.
  # Update this when upgrading the inference engine.
  LLAMA_CPP_RELEASE: 'latest'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            arch: x64
            bin_dir: linux
            asset_suffix: bin-linux-x64.zip
          - platform: macos
            os: macos-latest
            arch: arm64
            bin_dir: mac
            asset_suffix: bin-macos-arm64.zip
          - platform: macos
            os: macos-latest
            arch: x64
            bin_dir: mac
            asset_suffix: bin-macos-x64.zip
          - platform: windows
            os: windows-latest
            arch: x64
            bin_dir: win
            asset_suffix: bin-win-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Download llama.cpp binaries (not stored in git due to size)
      - name: Download llama.cpp binaries
        shell: bash
        run: |
          if [ "${{ env.LLAMA_CPP_RELEASE }}" = "latest" ]; then
            RELEASE_TAG=$(curl -sL "https://api.github.com/repos/ggerganov/llama.cpp/releases/latest" | grep '"tag_name"' | sed -E 's/.*"tag_name": *"([^"]+)".*/\1/')
          else
            RELEASE_TAG="${{ env.LLAMA_CPP_RELEASE }}"
          fi
          echo "Downloading llama.cpp ${RELEASE_TAG} for ${{ matrix.asset_suffix }}"
          ASSET_URL="https://github.com/ggerganov/llama.cpp/releases/download/${RELEASE_TAG}/llama-${RELEASE_TAG}-${{ matrix.asset_suffix }}"
          echo "Asset URL: ${ASSET_URL}"

          ZIP_PATH="${RUNNER_TEMP}/llama-bin.zip"
          mkdir -p "resources/binaries/${{ matrix.bin_dir }}"
          curl -sL "${ASSET_URL}" -o "${ZIP_PATH}"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows: use PowerShell to extract (convert Unix path to Windows path)
            WIN_ZIP=$(cygpath -w "${ZIP_PATH}")
            WIN_DEST=$(cygpath -w "resources/binaries/${{ matrix.bin_dir }}")
            pwsh -Command "Expand-Archive -Path '${WIN_ZIP}' -DestinationPath '${WIN_DEST}' -Force"
          else
            unzip -o "${ZIP_PATH}" -d "resources/binaries/${{ matrix.bin_dir }}"
          fi

          # Ensure llama-server is executable on Unix
          if [ "${{ matrix.platform }}" != "windows" ]; then
            chmod +x "resources/binaries/${{ matrix.bin_dir }}/llama-server" 2>/dev/null || true
          fi

          echo "Binaries downloaded:"
          ls -la "resources/binaries/${{ matrix.bin_dir }}/"

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: pnpm run build:linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build macOS
        if: matrix.platform == 'macos'
        run: pnpm run build:mac:${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Windows
        if: matrix.platform == 'windows'
        run: pnpm run build:win:${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'
      - uses: actions/upload-artifact@v4
        with:
          name: aincore-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.nupkg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.snap
            dist/*.yml
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
