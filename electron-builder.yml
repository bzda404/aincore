npmRebuild: true
appId: com.aincore.app
productName: AinCore
publish:
  provider: github
  owner: bzda404
  repo: aincore
  releaseType: release
directories:
  buildResources: build
  output: ./dist
files:
  - filter:
      - '!node_modules/**/*'
      - '!src/**/*'
      - 'out/**/*'
      - static/**/*
extraResources:
  - from: resources/binaries
    to: binaries
    filter:
      - '**/*'
win:
  executableName: aincore
  artifactName: 'aincore-win-${arch}-${version}.${ext}'
  target:
    - target: nsis
    - target: zip
  icon: static/icon.png
  signAndEditExecutable: false
nsis:
  artifactName: 'aincore-win-${arch}-${version}-setup.${ext}'
  shortcutName: AinCore
  uninstallDisplayName: AinCore
  createDesktopShortcut: false
  createStartMenuShortcut: true
mac:
  artifactName: 'aincore-mac-${arch}-${version}.${ext}'
  entitlementsInherit: build/mac/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  target:
    - dmg
    - zip
  icon: static/icon.png
dmg:
  artifactName: 'aincore-mac-${arch}-${version}.${ext}'
linux:
  artifactName: 'aincore-linux-${version}.${ext}'
  executableName: aincore
  description: '本地 AI 算力平台中枢'
  maintainer: 'AinCore'
  category: 'Utility'
  target:
    - AppImage
    - deb
